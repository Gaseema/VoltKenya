name: Deploy VoltKenya

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    # Increased memory limit to support build with swap
    env:
      NODE_OPTIONS: "--max-old-space-size=1536"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fix Permissions
        run: |
          sudo chown -R ubuntu:ubuntu .
          sudo chmod -R 755 .

      - name: Copy environment file
        run: sudo -u ubuntu cp /var/www/voltkenya/.env .env

      - name: Install dependencies
        run: sudo -u ubuntu npm install

      - name: Run Prisma Generate
        run: sudo -u ubuntu npx prisma generate

      - name: Build application
        run: sudo -u ubuntu npm run build

      - name: Deploy with PM2
        run: |
          # Kill any process on port 3020 to prevent EADDRINUSE
          sudo fuser -k 3020/tcp || true
          sudo -u ubuntu pm2 delete voltkenya || true
          sudo -u ubuntu pm2 start npm --name "voltkenya" -- start
          sudo -u ubuntu pm2 save

      - name: Reset Permissions for next checkout
        if: always()
        run: |
          sudo chown -R github-runner:github-runner .
