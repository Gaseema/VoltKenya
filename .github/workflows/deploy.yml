name: Deploy VoltKenya

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    env:
      NODE_OPTIONS: "--max-old-space-size=1536"
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare environment
        run: |
          sudo chown -R $USER:$USER .
          sudo chmod -R 755 .
          
          # CRITICAL: Verify and copy .env before any build steps
          if [ -f /var/www/voltkenya/.env ]; then
            cp /var/www/voltkenya/.env .env
            echo ".env file synchronized"
          else
            echo "::error:: /var/www/voltkenya/.env not found! Database operations will fail."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci --include=dev --prefer-offline --no-audit

      - name: Database Sync
        run: |
          # Ensure Prisma client is generated FIRST
          npx prisma generate
          
          # Sync schema to DB - Fail if this fails!
          # Using --accept-data-loss to ensure it completes if you've made breaking schema changes
          npx prisma db push --accept-data-loss

      - name: Build application
        run: npm run build

      - name: Deploy with PM2
        run: |
          sudo fuser -k 3020/tcp || true
          
          # Reload/Start app as ubuntu user
          sudo -u ubuntu pm2 reload voltkenya || \
          sudo -u ubuntu pm2 start npm --name "voltkenya" -- start
          
          sudo -u ubuntu pm2 save

      - name: Reset Permissions for next checkout
        if: always()
        run: |
          sudo chown -R github-runner:github-runner . || true
